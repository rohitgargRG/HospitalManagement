name: Build and Test

on:
  push:
    branches:
      - main
      - addingdeploy

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build JAR & Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hms_copy
          MYSQL_USER: dev
          MYSQL_PASSWORD: root
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Wait for MySQL to be Ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h "127.0.0.1" -P 3307 -u dev -proot --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Initialize Database Schema
        run: |
          mysql -h 127.0.0.1 -P 3307 -u dev -proot < schema.sql
          echo "Database schema initialized successfully!"

      - name: Run Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3307/hms_copy
          SPRING_DATASOURCE_USERNAME: dev
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          mvn test --no-transfer-progress | tee test-output.txt || true

      - name: Parse and Display Test Results
        run: |
          echo "========================================"
          echo "         TEST RESULTS SUMMARY          "
          echo "========================================"

          PASSED=$(grep -oP 'Tests run: \K[0-9]+' test-output.txt | awk '{s+=$1} END {print s+0}')
          FAILED=$(grep -oP 'Failures: \K[0-9]+' test-output.txt | awk '{s+=$1} END {print s+0}')
          SKIPPED=$(grep -oP 'Skipped: \K[0-9]+' test-output.txt | awk '{s+=$1} END {print s+0}')

          echo ""
          echo "  Passed  : $PASSED"
          echo "  Failed  : $FAILED"
          echo "  Skipped : $SKIPPED"
          echo ""
          echo "========================================"
          echo "ALL TESTS DONE!"

      - name: Build JAR
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3307/hms_copy
          SPRING_DATASOURCE_USERNAME: dev
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          mvn clean package -DskipTests --no-transfer-progress; exit ${PIPESTATUS[0]}
      - name: Get JAR filename
        id: jar
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*original*" | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "ERROR: No JAR file found in target/"
            ls -lh target/
            exit 1
          fi
          echo "jar_path=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR_FILE"
          ls -lh "$JAR_FILE"

      - name: Create GitHub Release & Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release #${{ github.run_number }}"
          body: |
            Automated release from push to main
            - Commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}
            - Tests Passed: All tests passing
          files: ${{ steps.jar.outputs.jar_path }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Upload Test Output (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
